name: Preview Deploy (Pull Requests)

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    name: Build & Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Deploy Preview to Vercel
        id: preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Comment Preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## 🎨 PCOS Preview Deployment',
                '',
                `**Preview URL:** ${{ steps.preview.outputs.preview-url }}`,
                '',
                '| Flow | Test |',
                '|---|---|',
                '| Teacher: Generate Mission | Sign in → Create tab → fill form → Generate |',
                '| Student: Complete Mission | Sign in as student → Mission tab → Accept → Complete |',
                '| Portfolio | Sign in as student → Portfolio tab |',
                '',
                '**Demo accounts:** teacher@primeluckdemo.com / student@primeluckdemo.com (password: demo1234)',
              ].join('\n')
            })
