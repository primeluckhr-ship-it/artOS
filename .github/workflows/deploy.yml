name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./

      - name: Update Linear — mark PRI-22 In Progress → Done
        if: success()
        run: |
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: ${{ secrets.LINEAR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { issueUpdate(id: \"${{ secrets.LINEAR_DEPLOY_ISSUE_ID }}\", input: { stateId: \"${{ secrets.LINEAR_DONE_STATE_ID }}\" }) { success } }"
            }'

      - name: Update Notion Build Log
        if: success()
        run: |
          curl -s -X PATCH \
            "https://api.notion.com/v1/pages/${{ secrets.NOTION_BUILD_LOG_PAGE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "properties": {}
            }'
          # Append deploy entry to build log
          curl -s -X PATCH \
            "https://api.notion.com/v1/blocks/${{ secrets.NOTION_BUILD_LOG_PAGE_ID }}/children" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "{
              \"children\": [{
                \"object\": \"block\",
                \"type\": \"paragraph\",
                \"paragraph\": {
                  \"rich_text\": [{
                    \"type\": \"text\",
                    \"text\": {
                      \"content\": \"✅ Production deploy — ${{ github.sha }} — ${{ steps.deploy.outputs.preview-url }}\"
                    }
                  }]
                }
              }]
            }"

      - name: Summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
